[workspace]
name = "lfortran"
version = "0.61.0"
description = "Modern interactive LLVM-based Fortran compiler"
authors = ["LFortran Maintainers <lfortran@groups.io>"]
channels = ["conda-forge"]
platforms = ["osx-arm64", "win-64", "linux-64"]

# feature.default.tasks
[tasks]
start = "lfortran"
clean = "git clean -dfx -e '.pixi'"

[feature.test.tasks]
ctest = "cmake --build build_debug --parallel --target test"
tests = "./run_tests.py"
integration_tests = "cd integration_tests && ./run_tests.py -j16"

[feature.llvm22.dependencies]
llvmdev = ">=22.1.0,<23"
clang = ">=22.1.0,<23"
clangxx = ">=22.1.0,<23"

[feature.llvm22.target.linux.dependencies]
libunwind = "=1.7.2"
[feature.llvm22.target.linux-64.dependencies]
libunwind = ">=1.8.3,<2"

# Dependencies to build the project to be installed for the target architecture.
# host == target
[feature.build.dependencies]
pytest = ">=9.0.2,<10"
jupyter = ">=1.1.1,<2"
xeus = ">=5.1.0,<6"
xeus-zmq = ">=3.0.0,<4"
nlohmann_json = ">=3.12.0,<4"
jupyter_kernel_test = ">=0.7.0,<0.8"
numpy = ">=2.4.3,<3"
rapidjson = ">=1.1.0.post20240409,<2"
zlib = ">=1.3.2,<2"
zstd-static = ">=1.5.7,<2"
python = ">=3.14.3,<3.15"
cmake = ">=4.3.1,<5"
ninja = ">=1.13.2,<2"
#cxx-compiler = "*"
re2c = ">=4.4,<5"

# Dependencies to build the project to be installed on the build machine.
# feature.default.build-dependencies
[dependencies]
python = ">=3.14.3,<3.15"
shell = ">=0.2.0,<0.3"
pandoc = ">=3.9.0.2,<4"
toml = ">=0.10.2,<0.11"
fpm = ">=0.10.1,<0.14"

[feature.test.dependencies]
python = ">=3.14.3,<3.15"
toml = ">=0.10.2,<0.11"
cmake = ">=4.3.1,<5"
ninja = ">=1.13.2,<2"

[feature.build.target.unix.dependencies]
bison = "=3.4"

[feature.build.target.win.dependencies]
m2-bison = "=3.0.4"

[feature.build.target.osx-arm64.dependencies]
bison = ">=3.8.2,<4"

[feature.build.target.win-64.dependencies]
m2-bison = ">=3.0.4,<4"

[feature.build.target.linux-64.dependencies]
bison = ">=3.8.2,<4"

[feature.build.tasks]
build = "bash ./build1.sh"

[environments]
llvm22 = {features = ["llvm22", "build", "test"]}
test = {features = ["test"]}
